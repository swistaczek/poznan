site_name: "Poznań — inicjatywy obywatelskie"
site_description: "Baza wiedzy i dokumenty dla obywatelskich inicjatyw w Poznaniu: hałas, rowery, uspokojenie ruchu, UDIP, transparentność."
site_author: "Inicjatywa obywatelska"
site_url: "https://swistaczek.github.io/poznan/"
repo_url: "https://github.com/swistaczek/poznan"
repo_name: "swistaczek/poznan"
edit_uri: "edit/main/"

# Repo trzyma treść na płaskim root-level (dla aktywisty i Claude Code).
# MkDocs wymaga docs_dir jako podkatalog — mirrorowanie przez `scripts/mirror-to-docs.sh`
# (CI robi to przed buildem, lokalnie również). docs/ jest gitignored.
docs_dir: docs
site_dir: _site

theme:
  name: material
  custom_dir: overrides
  language: pl
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Tryb ciemny
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Tryb jasny
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  # search: PL stemmer nie jest wspierany w MkDocs Material (fallback do EN).
  - search:
      separator: '[\s\-\.\,\;\:\!\?]+'
  - awesome-pages
  # social: auto-generuje OG image PNG + tagi Open Graph / Twitter Card per stronę.
  # Wymaga mkdocs-material[imaging] (pillow + cairosvg).
  - social:
      cards_layout_options:
        background_color: "#3f51b5"
        color: "#ffffff"
        font_family: Roboto
  # git-revision-date: wyłączony — docs/ jest rsync-mirror z root, brak git-log
  # w mirrorze. MkDocs sitemap używa build-date jako lastmod (wystarczająco dobre).
  # - git-revision-date-localized:
  #     type: date
  #     locale: pl
  #     fallback_to_build_date: true
  # minify: kompresja HTML/CSS/JS dla Core Web Vitals / Page Speed.
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  # Material icons (:material-xxx:, :octicons-xxx-NN:) + twemoji
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/swistaczek/poznan
      name: Repozytorium na GitHubie
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/swistak
      name: Maintainer na X
  generator: false

# Pliki wykluczone z publicznej strony.
# UWAGA: NIE wyklucza się `wyniki-*.md` ani `dabrowskiego/` — to publiczna wartość repo.
exclude_docs: |
  CLAUDE.md
  **/CLAUDE.md
  MEMORY.md
  **/MEMORY.md
  _site/
  .github/
  .git/
  .claude/
  .venv/
  venv/
  node_modules/
  requirements-docs.txt
  research/prompty/
  docs-local.md
